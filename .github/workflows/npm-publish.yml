name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm

      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$RELEASE_PRERELEASE" != "false" ]; then
            echo "npm publication accepts stable GitHub releases only" >&2
            exit 1
          fi
          if [[ "$PKG_VERSION" == *-* ]]; then
            echo "Prerelease package versions require a separate non-latest publication workflow" >&2
            exit 1
          fi
          if [ "$RELEASE_TAG" != "v$PKG_VERSION" ]; then
            echo "Release tag ($RELEASE_TAG) does not match package.json version ($PKG_VERSION)" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release commit is not reachable from main" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm run verify:commit
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:coverage
      - run: npm audit
      - run: npm run audit:runtime
      - name: Smoke-test the exact release tarball
        run: node scripts/package-smoke.mjs package

      - name: Preserve the verified tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-package
          path: package/*.tgz
          if-no-files-found: error

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false
      - run: npm install --global npm@12.0.1
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-package
          path: package
      - name: Publish the single verified tarball
        run: |
          shopt -s nullglob
          packages=(package/*.tgz)
          if [ "${#packages[@]}" -ne 1 ]; then
            echo "Expected one verified tarball, found ${#packages[@]}" >&2
            exit 1
          fi
          npm publish "./${packages[0]}" --provenance --access public
