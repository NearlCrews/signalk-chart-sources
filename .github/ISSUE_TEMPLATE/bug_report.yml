name: Bug report
description: Report a defect in the library
title: "[BUG] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so the issue can be reproduced and triaged.
        For usage questions, please use [Discussions](https://github.com/NearlCrews/signalk-chart-sources/discussions) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the bug.
      placeholder: estimateBytes accepts an invalid measured average for a known source.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: A minimal code sample and the inputs that trigger the bug.
      placeholder: |
        import { chartSourceById, tilesInBbox } from 'signalk-chart-sources'
        const source = chartSourceById('seamark')
        if (!source) throw new Error('source unavailable')
        const tiles = tilesInBbox(source, [-83, 41, -82, 42], [0, 4])
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Source registry (CHART_SOURCES)
        - Source validation and coverage
        - Web Mercator tile math, counting, and enumeration
        - Upstream URL building (expandUpstreamUrl, proxyTileTemplate)
        - Byte estimates and fallbacks
        - Public types and readonly contracts
        - Package, CI, release, or upstream monitor
        - Other
    validations:
      required: true

  - type: input
    id: source-id
    attributes:
      label: Chart source id
      description: Optional. If the bug is tied to a specific source, give its id.
      placeholder: depth-gebco

  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: 0.3.0
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: 24.18.0
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How is the package used
      options:
        - Transitive dependency of signalk-chart-locker
        - Transitive dependency of signalk-binnacle
        - Direct dependency
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Output or errors
      description: Paste the relevant output, stack trace, or returned value.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else helpful.
