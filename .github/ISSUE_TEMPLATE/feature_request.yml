name: Feature request
description: Suggest a new capability or improvement
title: "[FEATURE] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please share enough detail to evaluate the use case and how it would fit the library.

  - type: textarea
    id: description
    attributes:
      label: Feature description
      description: What the feature is and the problem it solves.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Who benefits and how they would use this in practice.
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: How you imagine the feature working.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: area
    attributes:
      label: Chart sources, tile math, or byte estimate
      description: If the request involves a specific chart source, a Web Mercator tile-math helper, or the byte estimate, describe it here.
      placeholder: |
        Area: Source registry
        Request: add a raster overlay source for a national hydrographic service
        Upstream mode: WMS GetMap

  - type: textarea
    id: additional
    attributes:
      label: Additional context
